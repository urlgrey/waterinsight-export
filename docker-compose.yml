services:
  waterinsight-export:
    image: skidder/waterinsight-export:latest
    container_name: waterinsight-export
    restart: unless-stopped
    env_file: .env
    volumes:
      - watersight-data:/data
    # Use host network to reach InfluxDB/HA on the LAN
    network_mode: host

volumes:
  watersight-data:
